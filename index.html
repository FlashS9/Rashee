<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Typing Shooter Game</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: monospace;
}
#game {
  position: relative;
  width: 100vw;
  height: 100vh;
}
.enemy {
  position: absolute;
  color: red;
  font-size: 20px;
}
#score {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 18px;
}
#inputBox {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  padding: 10px;
  font-size: 18px;
}
</style>
</head>
<body>
<div id="game">
  <div id="score">Score: 0</div>
</div>
<input id="inputBox" placeholder="Type to shoot..." autofocus />

<script>
const words = ["attack","defend","laser","enemy","code","javascript","speed","focus","target","fire"];
let enemies = [];
let score = 0;

function spawnEnemy() {
  const word = words[Math.floor(Math.random() * words.length)];
  const el = document.createElement("div");
  el.classList.add("enemy");
  el.textContent = word;
  el.style.left = Math.random() * (window.innerWidth - 100) + "px";
  el.style.top = "0px";
  document.getElementById("game").appendChild(el);

  enemies.push({ el, word, y: 0 });
}

function updateEnemies() {
  enemies.forEach((enemy, index) => {
    enemy.y += 0.5;
    enemy.el.style.top = enemy.y + "px";

    if (enemy.y > window.innerHeight) {
      enemy.el.remove();
      enemies.splice(index, 1);
    }
  });
}

function shoot(word) {
  enemies.forEach((enemy, index) => {
    if (enemy.word === word) {
      enemy.el.remove();
      enemies.splice(index, 1);
      score += 10;
      document.getElementById("score").textContent = "Score: " + score;
    }
  });
}

setInterval(spawnEnemy, 1500);
setInterval(updateEnemies, 20);

const input = document.getElementById("inputBox");
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    shoot(input.value.trim());
    input.value = "";
  }
});
</script>
</body>
</html>
