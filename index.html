<html lang="en">
  <title>AB Computer Shop</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="navbar">
    <div class="brand">AB Computer</div>
    <div class="tagline">Quality Tech Solutions</div>
  </header>

  <div class="container">
    <h2>Create Invoice</h2>

    <div class="customer">
      <input type="text" id="customerName" placeholder="Customer Name" required>
      <input type="text" id="customerContact" placeholder="Contact Number">
    </div>

    <form id="orderForm">
      <div class="product">
        <label>Keyboard ($20)</label>
        <input type="number" min="0" value="0" id="keyboard">
      </div>

      <div class="product">
        <label>Mouse ($10)</label>
        <input type="number" min="0" value="0" id="mouse">
      </div>

      <div class="product">
        <label>Monitor ($150)</label>
        <input type="number" min="0" value="0" id="monitor">
      </div>

      <div class="product">
        <label>USB Drive ($25)</label>
        <input type="number" min="0" value="0" id="usb">
      </div>

      <button type="button" onclick="generateInvoice()">Create Invoice</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
