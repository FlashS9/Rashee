<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ABS Computer | Invoice System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="welcome-bar">
        WELCOME TO ABS COMPUTER - ROCKHAMPTON, FORT WORTH, TEXAS
    </div>

    <div class="main-bg">
        <div class="form-container">
            <h2>Create New Invoice</h2>
            <div class="input-row">
                <div class="field">
                    <label>Product Item</label>
                    <select id="itemSelect">
                        <option value="" data-price="0">-- Choose Component --</option>
                        <option value="GTX 4090 GPU" data-price="1600">GTX 4090 GPU</option>
                        <option value="Ryzen 9 Processor" data-price="550">Ryzen 9 Processor</option>
                        <option value="32GB DDR5 RAM" data-price="120">32GB DDR5 RAM</option>
                        <option value="1TB NVMe SSD" data-price="90">1TB NVMe SSD</option>
                        <option value="System Diagnostic" data-price="75">System Diagnostic Fee</option>
                    </select>
                </div>
                <div class="field">
                    <label>Quantity</label>
                    <input type="number" id="qtyInput" min="1" value="1">
                </div>
                <button onclick="addToCart()" class="btn-add">Add Item</button>
            </div>

            <table id="previewTable">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Price</th>
                        <th>Qty</th>
                        <th>Subtotal</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <button onclick="printInvoice()" class="btn-print">Generate & Print Official Invoice</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
