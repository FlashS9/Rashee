<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Computer Shop</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="navbar">Welcome to Computer Shop</header>

  <div class="container">
    <h2>Select Products</h2>

    <form id="orderForm">
      <div class="product">
        <label>Keyboard ($20)</label>
        <input type="number" min="0" value="0" id="keyboard">
      </div>

      <div class="product">
        <label>Mouse ($10)</label>
        <input type="number" min="0" value="0" id="mouse">
      </div>

      <div class="product">
        <label>Monitor ($150)</label>
        <input type="number" min="0" value="0" id="monitor">
      </div>

      <div class="product">
        <label>USB Drive ($25)</label>
        <input type="number" min="0" value="0" id="usb">
      </div>

      <button type="button" onclick="generateInvoice()">Create Invoice</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
