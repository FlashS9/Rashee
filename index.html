<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABS Computer - Invoice System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="welcome-bar">
        Welcome to ABS Computer | Rockhampton, Fort Worth, Texas
    </div>

    <div class="container">
        <header>
            <h1>Generate Official Invoice</h1>
        </header>

        <section class="invoice-form">
            <div class="input-group">
                <label>Select Product</label>
                <select id="productSelect">
                    <option value="0" data-price="0">-- Select Item --</option>
                    <option value="Gaming PC" data-price="1200">High-End Gaming PC</option>
                    <option value="Office Laptop" data-price="800">Professional Laptop</option>
                    <option value="Mechanical Keyboard" data-price="150">RGB Mechanical Keyboard</option>
                    <option value="27 Inch Monitor" data-price="300">4K UHD Monitor</option>
                </select>
            </div>

            <div class="input-group">
                <label>Quantity</label>
                <input type="number" id="quantity" min="1" value="1">
            </div>

            <button onclick="addItem()" class="btn-add">Add to List</button>
        </section>

        <table id="cartTable">
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Price</th>
                    <th>Qty</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <div class="actions">
            <button onclick="generateInvoice()" class="btn-submit">Create & Preview Invoice</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
