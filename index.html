<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Label Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="no-print container">
        <h1>Label Generator</h1>
        <form id="labelForm">
            <div class="form-section">
                <h3>From (Sender)</h3>
                <input type="text" id="sName" placeholder="Sender Name" required>
                <input type="text" id="sAddr1" placeholder="Address Line 1" required>
                <input type="text" id="sAddr2" placeholder="Address Line 2">
                <input type="text" id="sPhone1" placeholder="Phone Number 1" required>
                <input type="text" id="sPhone2" placeholder="Phone Number 2">
            </div>

            <div class="form-section">
                <h3>To (Recipient)</h3>
                <input type="text" id="rName" placeholder="Receiver Name" required>
                <input type="text" id="rAddr1" placeholder="Address Line 1" required>
                <input type="text" id="rAddr2" placeholder="Address Line 2">
                <input type="text" id="rPhone1" placeholder="Phone Number 1" required>
                <input type="text" id="rPhone2" placeholder="Phone Number 2">
            </div>

            <div class="form-section">
                <h3>Additional Details</h3>
                <input type="text" id="details" placeholder="Package details, weight, or notes...">
            </div>

            <button type="button" onclick="window.print()">Print Label</button>
        </form>
    </div>

    <div id="label-page">
        <div class="label-border">
            <div class="label-content">
                <div class="column">
                    <h2>From</h2>
                    <hr>
                    <div class="info">
                        <p id="p-sName" class="name-bold">Sender Name</p>
                        <p id="p-sAddr1">Address line 1</p>
                        <p id="p-sAddr2">Address line 2</p>
                        <br>
                        <p id="p-sPhone1">Phone Number 1</p>
                        <p id="p-sPhone2">Phone Number 2</p>
                    </div>
                </div>

                <div class="vertical-divider"></div>

                <div class="column">
                    <h2>To</h2>
                    <hr>
                    <div class="info">
                        <p id="p-rName" class="name-bold">Receiver Name</p>
                        <p id="p-rAddr1">Address line 1</p>
                        <p id="p-rAddr2">Address line 2</p>
                        <br>
                        <p id="p-rPhone1">Phone Number 1</p>
                        <p id="p-rPhone2">Phone Number 2</p>
                    </div>
                </div>
            </div>
            <div class="bottom-box">
                <p id="p-details"></p>
            </div>
        </div>
    </div>

    <script src="C:\Users\ADMIN\Desktop\web\script.js"></script>
</body>
</html>
