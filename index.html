<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shipping Form</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h2>Shipping Form</h2>

  <form id="form">
    <div class="form-grid">
      
      <!-- Sender -->
      <div class="section">
        <h3>From</h3>
        <input type="text" placeholder="Sender Name" id="s_name">
        <input type="text" placeholder="Address line 1" id="s_addr1">
        <input type="text" placeholder="Address line 2" id="s_addr2">
        <input type="text" placeholder="Phone Number 1" id="s_phone1">
        <input type="text" placeholder="Phone Number 2" id="s_phone2">
      </div>

      <!-- Receiver -->
      <div class="section">
        <h3>To</h3>
        <input type="text" placeholder="Receiver Name" id="r_name">
        <input type="text" placeholder="Address line 1" id="r_addr1">
        <input type="text" placeholder="Address line 2" id="r_addr2">
        <input type="text" placeholder="Phone Number 1" id="r_phone1">
        <input type="text" placeholder="Phone Number 2" id="r_phone2">
      </div>

    </div>

    <button type="button" onclick="generatePrint()">Print</button>
  </form>

  <!-- Printable Area -->
  <div id="printArea" class="print-area"></div>
</div>

<script src="script.js"></script>
</body>
</html>
