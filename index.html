<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>My Supabase Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="auth-ui">
        <h2>ඇතුළු වන්න (Login / Register)</h2>
        <input type="email" id="email" placeholder="ඊමේල් ලිපිනය"><br><br>
        <input type="password" id="password" placeholder="මුරපදය"><br><br>
        <button onclick="signUp()">Register</button>
        <button onclick="signIn()">Login</button>
    </div>

    <div id="shop-ui" style="display:none;">
        <h2>අපේ බඩු ලැයිස්තුව</h2>
        <div id="item-list"></div>
        <br>
        <button onclick="signOut()">Logout</button>
    </div>

    <script>
        // පියවර 4 හි කොපි කරගත් විස්තර මෙතැනට දාන්න
        const SB_URL = "rckgjyrzgnbrreslchaq";
        const SB_KEY = "rckgjyrzgnbrreslchaq";
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        // 1. Register වීම
        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signUp({ email, password });
            if (error) alert(error.message);
            else alert("ලියාපදිංචිය සාර්ථකයි! දැන් Login වෙන්න.");
        }

        // 2. Login වීම
        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('shop-ui').style.display = 'block';
                fetchItems(); // බඩු ලැයිස්තුව පෙන්වන්න
            }
        }

        // 3. බඩු ලැයිස්තුව පෙන්වීම
        async function fetchItems() {
            const { data: products, error } = await supabase.from('products').select('*');
            const listDiv = document.getElementById('item-list');
            listDiv.innerHTML = "";
            
            products.forEach(item => {
                listDiv.innerHTML += `
                    <div style="border:1px solid #ccc; margin:10px; padding:10px;">
                        <h3>${item.name}</h3>
                        <p>ඉතිරි ප්‍රමාණය: ${item.stock}</p>
                        <button onclick="buyItem(${item.id}, ${item.stock})">මිලදී ගන්න (Buy)</button>
                    </div>
                `;
            });
        }

        // 4. බඩුවක් ගත් විට Stock එක අඩු කිරීම
        async function buyItem(id, currentStock) {
            if(currentStock <= 0) return alert("බඩු ඉවරයි!");

            const { error } = await supabase
                .from('products')
                .update({ stock: currentStock - 1 })
                .eq('id', id);

            if (error) alert("Error: " + error.message);
            else fetchItems(); // නැවත අලුත් ප්‍රමාණයන් පෙන්වන්න
        }

        // 5. Logout වීම
        async function signOut() {
            await supabase.auth.signOut();
            location.reload();
        }
    </script>
</body>
</html>
