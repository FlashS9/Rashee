<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Supabase Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f0f2f5; text-align: center; }
        .box { max-width: 400px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 95%; padding: 12px; background: #3ecf8e; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 6px; margin-top: 10px; }
        button:hover { background: #34b27b; }
        .item-card { border: 1px solid #eee; padding: 15px; margin: 15px 0; border-radius: 8px; background: #fafafa; }
    </style>
</head>
<body>

    <div id="auth-ui" class="box">
        <h2>ආයුබෝවන්</h2>
        <p>ඇතුළු වන්න හෝ ලියාපදිංචි වන්න</p>
        <input type="email" id="email" placeholder="ඊමේල් ලිපිනය">
        <input type="password" id="password" placeholder="මුරපදය">
        <button onclick="signIn()">Login</button>
        <button onclick="signUp()" style="background:#666;">Register</button>
    </div>

    <div id="shop-ui" class="box" style="display:none;">
        <h2>බඩු ලැයිස්තුව</h2>
        <div id="item-list"></div>
        <hr>
        <button onclick="signOut()" style="background: #ff4444;">Logout</button>
    </div>

    <script>
        // 1. ඔබේ විස්තර මෙතැනට ඇතුළත් කරන්න
        const SB_URL = "ඔබේ_PROJECT_URL_මෙතනට"; 
        const SB_KEY = "ඔබේ_ANON_KEY_මෙතනට";

        // Variable නම වෙනස් කරන ලදී (sbClient)
        const sbClient = supabase.createClient(SB_URL, SB_KEY);

        // 2. Register වීමේ ශ්‍රිතය
        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return alert("කරුණාකර සියල්ල පුරවන්න");

            const { error } = await sbClient.auth.signUp({ email, password });
            if (error) alert("වැරද්දක්: " + error.message);
            else alert("ලියාපදිංචිය සාර්ථකයි! දැන් Login වෙන්න.");
        }

        // 3. Login වීමේ ශ්‍රිතය
        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const { data, error } = await sbClient.auth.signInWithPassword({ email, password });
            
            if (error) {
                alert("Login අසාර්ථකයි: " + error.message);
            } else {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('shop-ui').style.display = 'block';
                fetchItems();
            }
        }

        // 4. දත්ත ගබඩාවෙන් බඩු ලබා ගැනීම
        async function fetchItems() {
            const { data: products, error } = await sbClient.from('products').select('*');
            
            if (error) {
                console.error(error);
                return;
            }

            const listDiv = document.getElementById('item-list');
            listDiv.innerHTML = "";
            
            products.forEach(item => {
                listDiv.innerHTML += `
                    <div class="item-card">
                        <strong>${item.name}</strong>
                        <p>ඉතිරි ප්‍රමාණය: ${item.stock}</p>
                        <button onclick="buyItem(${item.id}, ${item.stock})">මිලදී ගන්න</button>
                    </div>
                `;
            });
        }

        // 5. තොග ප්‍රමාණය අඩු කිරීම (Update)
        async function buyItem(id, currentStock) {
            if(currentStock <= 0) return alert("මෙම භාණ්ඩය අවසන්!");

            const { error } = await sbClient
                .from('products')
                .update({ stock: currentStock - 1 })
                .eq('id', id);

            if (error) alert("Update කිරීමට නොහැක: " + error.message);
            else fetchItems();
        }

        // 6. පිටවීම
        async function signOut() {
            await sbClient.auth.signOut();
            location.reload();
        }
    </script>
</body>
</html>
