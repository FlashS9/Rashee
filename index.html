<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Typing Shooter Game</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: monospace;
}
#game {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: url('https://static.vecteezy.com/system/resources/thumbnails/021/249/965/small_2x/background-starry-night-sky-stars-sky-night-silhouette-of-the-mountains-vector.jpg') no-repeat center center/cover;
}
.enemy {
  position: absolute;
  color: red;
  font-size: 20px;
}
#score, #missed {
  position: absolute;
  top: 10px;
  font-size: 18px;
}
#score { left: 10px; }
#missed { right: 10px; }
#controls {
  position: absolute;
  top: 40px;
  left: 10px;
}
button {
  margin-right: 5px;
  padding: 5px 10px;
}
#inputBox {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  padding: 10px;
  font-size: 18px;
}
.wish {
  position: absolute;
  color: gold;
  font-size: 40px;
  animation: floatUp 2s ease-out forwards;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-100px); }
}
</style>
</head>
<body>
<div id="game">
  <div id="score">Score: 0</div>
  <div id="missed">Missed: 0 / 5</div>
  <div id="controls">
    <button onclick="startGame()">Play</button>
    <button onclick="pauseGame()">Pause</button>
    <button onclick="stopGame()">Stop</button>
  </div>
</div>
<input id="inputBox" placeholder="Type to shoot..." autofocus />

<script>
const words = ["attack","defend","laser","enemy","code","javascript","speed","focus","target","fire","credit","department","General","Tech"];
let enemies = [];
let score = 0;
let missed = 0;
let running = false;
let spawnInterval, updateInterval;

function spawnEnemy() {
  if (!running) return;
  const word = Math.random() < 0.1 ? "wish" : words[Math.floor(Math.random() * words.length)];
  const el = document.createElement("div");
  el.classList.add("enemy");
  el.textContent = word;
  el.style.left = Math.random() * (window.innerWidth - 100) + "px";
  el.style.top = "0px";
  document.getElementById("game").appendChild(el);

  enemies.push({ el, word, y: 0 });
}

function updateEnemies() {
  if (!running) return;
  enemies.forEach((enemy, index) => {
    enemy.y += 0.5;
    enemy.el.style.top = enemy.y + "px";

    if (enemy.y > window.innerHeight) {
      enemy.el.remove();
      enemies.splice(index, 1);
      missed++;
      document.getElementById("missed").textContent = "Missed: " + missed + " / 5";
      if (missed >= 5) {
        alert("Game Over!");
        stopGame();
      }
    }
  });
}

function shoot(word) {
  enemies.forEach((enemy, index) => {
    if (enemy.word === word) {
      enemy.el.remove();
      enemies.splice(index, 1);

      if (word === "wish") {
        score += 1000;
        showWishAnimation();
      } else {
        score += 10;
      }

      document.getElementById("score").textContent = "Score: " + score;
    }
  });
}

function showWishAnimation() {
  const wish = document.createElement("div");
  wish.classList.add("wish");
  wish.textContent = "+1000 ✨";
  wish.style.left = "50%";
  wish.style.top = "50%";
  document.getElementById("game").appendChild(wish);

  setTimeout(() => wish.remove(), 2000);
}

function startGame() {
  if (running) return;
  running = true;
  spawnInterval = setInterval(spawnEnemy, 1500);
  updateInterval = setInterval(updateEnemies, 20);
}

function pauseGame() {
  running = false;
}

function stopGame() {
  running = false;
  clearInterval(spawnInterval);
  clearInterval(updateInterval);
  enemies.forEach(e => e.el.remove());
  enemies = [];
  score = 0;
  missed = 0;
  document.getElementById("score").textContent = "Score: 0";
  document.getElementById("missed").textContent = "Missed: 0 / 5";
}

const input = document.getElementById("inputBox");
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    shoot(input.value.trim());
    input.value = "";
  }
});
</script>
</body>
</html>
