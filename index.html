<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Smart Mobile Shop | Advanced E-Commerce</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Font Awesome 6 (Free Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #e9eef3 0%, #dce2ea 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Hero Entrance Page (splash) */
        .entrance-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 10%, #0b2b26, #05100e);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
            transition: opacity 0.7s ease, visibility 0.7s;
        }

        .hero-card {
            background: rgba(255,255,255,0.95);
            border-radius: 48px;
            max-width: 550px;
            width: 88%;
            text-align: center;
            padding: 30px 25px 40px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.4);
            animation: floatUp 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes floatUp {
            0% { transform: translateY(60px); opacity: 0; }
            100% { transform: translateY(0px); opacity: 1; }
        }

        .hero-card img {
            width: 120px;
            border-radius: 40px;
            margin-bottom: 16px;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.2));
        }

        .hero-card h1 {
            font-size: 2.4rem;
            background: linear-gradient(135deg, #1e5f5a, #28a745);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .hero-card p {
            color: #2c3e2f;
            margin-bottom: 28px;
            font-weight: 500;
        }

        .enter-btn {
            background: #2c9e6b;
            border: none;
            color: white;
            padding: 14px 28px;
            font-size: 1.2rem;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
            width: 80%;
        }

        .enter-btn:hover {
            background: #1e7650;
            transform: scale(1.02);
        }

        /* Main app container */
        .main-app {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Auth Box */
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
            padding: 30px 28px;
            transition: all 0.2s;
        }

        .auth-container {
            max-width: 480px;
            margin: 40px auto;
        }

        .flex-btns {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }
        .flex-btns button {
            flex: 1;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin: 12px 0;
            border: 1.5px solid #cfdfd9;
            border-radius: 28px;
            font-size: 1rem;
            background: #fff;
            transition: 0.2s;
        }

        input:focus {
            border-color: #2c9e6b;
            outline: none;
            box-shadow: 0 0 0 3px rgba(44,158,107,0.2);
        }

        button {
            background: #2c9e6b;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        button.outline-gray {
            background: #6c757d;
        }
        button.danger {
            background: #dc3545;
        }
        button.warning {
            background: #ffc107;
            color: #2c3e2f;
        }

        /* header with cart */
        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 28px;
            background: white;
            padding: 12px 25px;
            border-radius: 60px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
        }

        .cart-icon {
            position: relative;
            font-size: 1.8rem;
            cursor: pointer;
            background: #f0f2f5;
            padding: 8px 20px;
            border-radius: 50px;
            transition: 0.2s;
        }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e67e22;
            color: white;
            border-radius: 40px;
            padding: 4px 9px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* product grid */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin: 30px 0;
        }

        .product-card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 18px 30px rgba(0,0,0,0.15);
        }
        .product-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #eef2f7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            background: #f8fafc;
        }
        .product-info {
            padding: 18px;
        }
        .product-info h3 {
            margin-bottom: 6px;
            font-size: 1.4rem;
        }
        .stock-badge {
            font-size: 0.8rem;
            background: #e9ecef;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            margin: 8px 0;
        }
        .price {
            font-weight: bold;
            font-size: 1.3rem;
            color: #1f6e4a;
            margin: 8px 0;
        }
        .btn-add {
            width: 100%;
            background: #1f8a5c;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-add:disabled {
            background: #adb5bd;
            cursor: not-allowed;
        }

        /* cart modal */
        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 1100;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.25s;
        }
        .cart-modal.active {
            visibility: visible;
            opacity: 1;
        }
        .cart-panel {
            background: white;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            border-radius: 36px;
            padding: 24px;
            overflow-y: auto;
            box-shadow: 0 30px 40px black;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            padding: 14px 0;
        }
        .invoice-area {
            margin-top: 20px;
            background: #f8f9fa;
            border-radius: 24px;
            padding: 18px;
        }
        .invoice-btn {
            background: #2c9e6b;
            width: 100%;
            margin-top: 12px;
        }
        hr {
            margin: 12px 0;
        }
        @media (max-width: 650px) {
            .hero-card h1 { font-size: 1.8rem; }
            .shop-header { flex-direction: column; gap: 12px; }
        }
    </style>
</head>
<body>

<!-- ENTRANCE / HERO PAGE WITH IMAGE -->
<div id="entrancePage" class="entrance-overlay">
    <div class="hero-card">
        <img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png" alt="Smart Mobile Shop Logo">
        <h1>Smart Mobile Shop</h1>
        <p>Premium Gadgets & Accessories<br>Best Deals in Sri Lanka</p>
        <button class="enter-btn" id="enterShopBtn"><i class="fas fa-store"></i> Enter Store</button>
    </div>
</div>

<!-- main application wrapper (hidden initially, shown after entrance) -->
<div id="appRoot" style="display: none;">
    <!-- AUTHENTICATION SECTION -->
    <div id="authSection" class="auth-container" style="display: block;">
        <div class="glass-card">
            <h2 style="text-align:center;"><i class="fas fa-mobile-alt"></i> Welcome Back</h2>
            <p style="text-align:center;">Sign in to explore & shop</p>
            <input type="email" id="email" placeholder="Email address">
            <input type="password" id="password" placeholder="Password">
            <div class="flex-btns">
                <button onclick="authSignIn()"><i class="fas fa-sign-in-alt"></i> Login</button>
                <button onclick="authSignUp()" style="background: #4b6e8a;"><i class="fas fa-user-plus"></i> Register</button>
            </div>
            <div style="margin-top: 20px; font-size:0.8rem; text-align:center">Demo: register / login to start shopping</div>
        </div>
    </div>

    <!-- SHOP UI (after auth) -->
    <div id="shopMain" style="display: none;">
        <div class="main-app">
            <div class="shop-header">
                <h2><i class="fas fa-cart-shopping"></i> Smart Mobile Shop</h2>
                <div class="cart-icon" id="cartIconBtn">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cartBadge" class="cart-count">0</span>
                </div>
                <button onclick="logoutUser()" class="outline-gray" style="background:#e2e6ea; color:#2d3748;"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
            <!-- Products Grid with images & dynamic stock -->
            <div id="productGrid" class="items-grid"></div>
        </div>
    </div>

    <!-- CART MODAL (for cart & invoice) -->
    <div id="cartModal" class="cart-modal">
        <div class="cart-panel">
            <h3><i class="fas fa-shopping-bag"></i> Your Cart</h3>
            <div id="cartItemsList"></div>
            <div id="cartTotal" style="font-weight: bold; font-size:1.2rem;"></div>
            <div class="invoice-area">
                <button id="printInvoiceBtn" class="invoice-btn"><i class="fas fa-print"></i> Print Invoice</button>
            </div>
            <button onclick="closeCartModal()" class="outline-gray" style="margin-top:12px; background:#ccc;">Close</button>
        </div>
    </div>
</div>

<script>
   
    const SB_URL = "https://rckgjyrzgnbrreslchaq.supabase.co"; 
    const SB_KEY = "sb_publishable_C7s89GZ_f3Lo9eX0DaVsEQ_uiPKvF-l";
    const sbClient = supabase.createClient(SB_URL, SB_KEY);

    // ---------- Global state ----------
    let currentUser = null;
    let productsData = [];           // store full product list from supabase
    let cart = [];                  // each item: { id, name, price, stock, quantity, imageIcon? }

    // DOM elements
    const entranceDiv = document.getElementById('entrancePage');
    const appRoot = document.getElementById('appRoot');
    const authSection = document.getElementById('authSection');
    const shopMain = document.getElementById('shopMain');
    const cartModal = document.getElementById('cartModal');
    const cartBadge = document.getElementById('cartBadge');
    const cartIconBtn = document.getElementById('cartIconBtn');

    // Helper: update cart UI (badge & local storage)
    function updateCartUI() {
        const totalQty = cart.reduce((sum, it) => sum + it.quantity, 0);
        if (cartBadge) cartBadge.innerText = totalQty;
        localStorage.setItem(`cart_${currentUser?.id || 'guest'}`, JSON.stringify(cart));
    }

    // load cart from localStorage
    function loadCartFromStorage() {
        if (!currentUser) return;
        const stored = localStorage.getItem(`cart_${currentUser.id}`);
        if (stored) {
            try {
                cart = JSON.parse(stored);
                if (!Array.isArray(cart)) cart = [];
                // ensure quantity integrity
                cart = cart.filter(item => item.quantity > 0);
            } catch(e) { cart = []; }
        } else { cart = []; }
        updateCartUI();
    }

    // render product grid with images & add-to-cart
    function renderProducts() {
        const grid = document.getElementById('productGrid');
        if (!grid) return;
        if (!productsData.length) {
            grid.innerHTML = '<div style="text-align:center; padding:40px;">Loading awesome items...</div>';
            return;
        }
        grid.innerHTML = '';
        productsData.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            // image fallback: using unsplash style + product name emoji/icon -> we assign dynamic image based on category/style
            let imgSrc = product.image_url || `https://picsum.photos/id/${(product.id % 100) + 10}/300/200`; 
            // if product name includes mobile/phone make some nicer icon
            const displayIcon = product.name.toLowerCase().includes('phone') ? '📱' : (product.name.toLowerCase().includes('case') ? '📁' : '📦');
            card.innerHTML = `
                <div class="product-img">
                    <img src="${imgSrc}" alt="${product.name}" style="width:100%;height:100%;object-fit:cover;" onerror="this.onerror=null;this.src='https://placehold.co/400x200?text=${encodeURIComponent(product.name)}';">
                </div>
                <div class="product-info">
                    <h3>${escapeHtml(product.name)}</h3>
                    <div class="stock-badge"><i class="fas fa-boxes"></i> Stock: ${product.stock}</div>
                    <div class="price">LKR ${product.price ? product.price : '1990'}</div>
                    <button class="btn-add" data-id="${product.id}" data-name="${escapeHtml(product.name)}" data-price="${product.price || 1990}" data-stock="${product.stock}">
                        <i class="fas fa-cart-plus"></i> Add to Cart
                    </button>
                </div>
            `;
            grid.appendChild(card);
            const addBtn = card.querySelector('.btn-add');
            addBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const stock = parseInt(addBtn.dataset.stock);
                const productId = parseInt(addBtn.dataset.id);
                const itemInCart = cart.find(i => i.id === productId);
                const currentQtyInCart = itemInCart ? itemInCart.quantity : 0;
                if (stock <= 0 || currentQtyInCart >= stock) {
                    alert("Out of stock or maximum reached!");
                    return;
                }
                addToCart({
                    id: productId,
                    name: addBtn.dataset.name,
                    price: parseFloat(addBtn.dataset.price),
                    stock: stock,
                    quantity: 1
                });
            });
        });
    }

    function addToCart(item) {
        const existing = cart.find(i => i.id === item.id);
        if (existing) {
            if (existing.quantity < existing.stock) {
                existing.quantity++;
            } else {
                alert(`Cannot add more ${existing.name}, only ${existing.stock} in stock.`);
                return;
            }
        } else {
            cart.push({ ...item, quantity: 1 });
        }
        updateCartUI();
        showToast(`${item.name} added to cart`);
    }

    function showToast(msg) {
        let toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.left = '20px';
        toast.style.background = '#1e5f5a';
        toast.style.color = 'white';
        toast.style.padding = '12px 20px';
        toast.style.borderRadius = '40px';
        toast.style.zIndex = '9999';
        toast.style.fontWeight = 'bold';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // Fetch products from supabase (original method name fetchItems but extended with price column)
    async function fetchItems() {
        // check if products table has price, else fallback demo
        const { data: products, error } = await sbClient.from('products').select('*');
        if (error) {
            console.error(error);
            productsData = [];
            document.getElementById('productGrid').innerHTML = `<div style="padding:20px;">Error loading products: ${error.message}</div>`;
            return;
        }
        if (products && products.length) {
            // ensure each product has price field (if not, set mock price)
            productsData = products.map(p => ({
                ...p,
                price: p.price || (p.id * 1290 + 500),
                image_url: p.image_url || null
            }));
        } else {
            // fallback demo data if supabase table empty
            productsData = [
                { id: 1, name: "iPhone 15 Pro", stock: 8, price: 249900, image_url: "https://images.unsplash.com/photo-1695048133142-1a20484d2569?w=300&h=200&fit=crop" },
                { id: 2, name: "Samsung Galaxy S24", stock: 5, price: 189900, image_url: "https://images.unsplash.com/photo-1610945415295-d9bbf067e59c?w=300&h=200&fit=crop" },
                { id: 3, name: "Wireless Earbuds", stock: 12, price: 8990, image_url: "https://images.unsplash.com/photo-1590658268037-6bf12165a877?w=300&h=200&fit=crop" },
            ];
        }
        renderProducts();
    }

    // Display Cart Modal with items and invoice option
    function openCartModal() {
        if (!cart.length) {
            alert("Cart is empty.");
            return;
        }
        renderCartModalContent();
        cartModal.classList.add('active');
    }

    function closeCartModal() {
        cartModal.classList.remove('active');
    }

    function renderCartModalContent() {
        const container = document.getElementById('cartItemsList');
        const totalSpan = document.getElementById('cartTotal');
        if (!container) return;
        if (!cart.length) {
            container.innerHTML = "<p>No items in cart</p>";
            totalSpan.innerHTML = "";
            return;
        }
        let total = 0;
        let html = '';
        cart.forEach((item, idx) => {
            const subtotal = item.price * item.quantity;
            total += subtotal;
            html += `
                <div class="cart-item">
                    <div><strong>${escapeHtml(item.name)}</strong><br><small>LKR ${item.price.toFixed(2)} x ${item.quantity}</small></div>
                    <div>LKR ${subtotal.toFixed(2)} 
                        <button style="background:#dc3545; padding:4px 10px; margin-left:8px;" onclick="removeFromCart(${idx})"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        totalSpan.innerHTML = `<hr><strong>Total Amount: LKR ${total.toFixed(2)}</strong>`;
        // attach print invoice event each time
        const printBtn = document.getElementById('printInvoiceBtn');
        if (printBtn) {
            printBtn.onclick = () => printInvoice(total);
        }
    }

    function removeFromCart(index) {
        if (index >= 0 && index < cart.length) {
            cart.splice(index, 1);
            updateCartUI();
            renderCartModalContent();
            if (cart.length === 0) closeCartModal();
        }
    }

    // Print Invoice with store details
    function printInvoice(grandTotal) {
        if (!cart.length) {
            alert("No items to invoice");
            return;
        }
        let invoiceHtml = `
            <html>
            <head><title>Smart Mobile Invoice</title>
            <style>
                body { font-family: monospace; padding: 30px; max-width: 600px; margin:auto; }
                .invoice-box { border: 2px solid #2c9e6b; padding: 20px; border-radius: 16px; }
                h2 { color: #1f6e4a; }
                hr { margin: 15px 0; }
                table { width:100%; border-collapse: collapse; }
                th, td { text-align: left; padding: 8px; border-bottom: 1px solid #ccc; }
                .total { font-size: 1.2rem; font-weight: bold; }
            </style>
            </head>
            <body>
            <div class="invoice-box">
                <h2>🛒 Smart Mobile Shop Invoice</h2>
                <p><strong>Date:</strong> ${new Date().toLocaleString()}</p>
                <p><strong>Customer:</strong> ${currentUser?.email || 'Valued Customer'}</p>
                <hr>
                <table>
                    <tr><th>Item</th><th>Qty</th><th>Unit Price</th><th>Subtotal</th></tr>
        `;
        cart.forEach(item => {
            invoiceHtml += `<tr>
                <td>${escapeHtml(item.name)}</td>
                <td>${item.quantity}</td>
                <td>LKR ${item.price.toFixed(2)}</td>
                <td>LKR ${(item.price * item.quantity).toFixed(2)}</td>
            </tr>`;
        });
        invoiceHtml += `
                </table>
                <hr>
                <div class="total">GRAND TOTAL: LKR ${grandTotal.toFixed(2)}</div>
                <br>
                <p><i>Thank you for shopping at Smart Mobile Shop! 📱✨</i></p>
            </div>
            </body></html>
        `;
        const win = window.open();
        win.document.write(invoiceHtml);
        win.document.close();
        win.print();
    }

    // AUTH FUNCTIONS (preserved syntax + correct alerts)
    async function authSignUp() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        if (!email || !password) return alert("Fill All fields");
        const { error } = await sbClient.auth.signUp({ email, password });
        if (error) alert("Registration error: " + error.message);
        else alert("Registration successful! Now Login.");
    }

    async function authSignIn() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await sbClient.auth.signInWithPassword({ email, password });
        if (error) {
            alert("Login Failed: " + error.message);
        } else {
            currentUser = data.user;
            authSection.style.display = 'none';
            shopMain.style.display = 'block';
            loadCartFromStorage();
            await fetchItems();
        }
    }

    async function logoutUser() {
        await sbClient.auth.signOut();
        currentUser = null;
        cart = [];
        location.reload(); // reset to entrance flow
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // ENTRANCE PAGE HANDLER
    document.getElementById('enterShopBtn').addEventListener('click', () => {
        entranceDiv.style.opacity = '0';
        setTimeout(() => {
            entranceDiv.style.display = 'none';
            appRoot.style.display = 'block';
        }, 600);
    });

    // cart icon click
    if (cartIconBtn) cartIconBtn.addEventListener('click', openCartModal);
    window.closeCartModal = closeCartModal;
    window.removeFromCart = removeFromCart;
    window.authSignIn = authSignIn;
    window.authSignUp = authSignUp;
    window.logoutUser = logoutUser;

    // Auto re-check session on load
    (async function checkSession() {
        const { data } = await sbClient.auth.getSession();
        if (data.session) {
            currentUser = data.session.user;
            // if app root visible after entrance - but we entrance still active; we replace flow
            setTimeout(() => {
                if (entranceDiv.style.display !== 'none') {
                    entranceDiv.style.display = 'none';
                    appRoot.style.display = 'block';
                }
                authSection.style.display = 'none';
                shopMain.style.display = 'block';
                loadCartFromStorage();
                fetchItems();
            }, 100);
        } else {
            // ensure auth visible
        }
    })();
</script>
</body>
</html>
