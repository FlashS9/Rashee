<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Invoice - AB Computer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="invoice-header">
    <h1>AB Computer</h1>
    <p>Computer Sales & Services</p>
    <hr>
  </div>

  <div class="invoice-container" id="invoice"></div>

  <div style="text-align:center; margin-top:20px;">
    <button onclick="window.print()">Print Invoice</button>
  </div>

  <script>
    const data = JSON.parse(localStorage.getItem("invoice"));
    const customer = JSON.parse(localStorage.getItem("customer"));

    let total = 0;
    let date = new Date().toLocaleString();

    let html = `
      <div class="invoice-info">
        <p><strong>Customer:</strong> ${customer.name}</p>
        <p><strong>Contact:</strong> ${customer.contact}</p>
        <p><strong>Date:</strong> ${date}</p>
      </div>
      <table>
        <tr><th>Item</th><th>Qty</th><th>Price</th></tr>`;

    data.forEach(item => {
      let subtotal = item.qty * item.price;
      total += subtotal;
      html += `<tr><td>${item.name}</td><td>${item.qty}</td><td>$${subtotal}</td></tr>`;
    });

    html += `</table><h3>Total: $${total}</h3>`;

    document.getElementById("invoice").innerHTML = html;
  </script>
</body>
</html>
